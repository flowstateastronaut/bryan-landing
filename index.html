<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bryan Boone</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: linear-gradient(180deg, #1E1E1E 0%, #2C2C2C 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 48px;
      padding: 48px 24px;
    }

    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .header img {
      width: 200px;
    }

    .header h1 {
      font-size: 32px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.90);
    }

    nav {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    nav a {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      text-decoration: none;
      text-align: center;
    }

    .link-title {
      font-size: 40px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.90);
    }

    .link-subtitle {
      font-size: 24px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.90);
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <img src="bryan-boone-logo-cutout.svg" alt="Bryan Boone logo">
      <h1>Bryan Boone</h1>
    </header>

    <nav>
      <a href="#">
        <span class="link-title">UX Case Studies + UI Design ›</span>
        <span class="link-subtitle">Are you fun to work with? Maybe we can make an app together.</span>
      </a>

      <a href="#">
        <span class="link-title">Paintings + Public Art ›</span>
        <span class="link-subtitle">I like to make pretty physical objects. Take a look.</span>
      </a>

      <a href="#">
        <span class="link-title">Art Shop ›</span>
        <span class="link-subtitle">Fill your home with art. It's an investment in everyday wonder.</span>
      </a>
    </nav>
  </div>
</body>
</html>
